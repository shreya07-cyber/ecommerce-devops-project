name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  # ── STAGE 1: Install & Test ────────────────────────────────────────────────
  build-and-test:
    name: 🔧 Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run Tests with Pytest
        run: |
          export PYTHONPATH=$PWD
          pytest --junitxml=report.xml -v

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: report.xml

  # ── STAGE 2: Docker Build & Smoke Test ────────────────────────────────────
  docker-build:
    name: 🐳 Build & Test Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🏗️ Build Docker Image
        run: docker build -t ecommerce-app:latest .

      - name: 🚀 Run Container & Smoke Test
        run: |
          docker run -d -p 5000:5000 --name test-container ecommerce-app:latest
          sleep 5
          curl -f http://localhost:5000 || exit 1
          docker stop test-container
          docker rm test-container

  # ── STAGE 3: Deploy to Render (Staging) ───────────────────────────────────
  deploy:
    name: ☁️ Deploy to Staging (Render)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
